<div class="repo p-2 text-center">
  <a href="https://github.com/{{ include.username }}">
    <img class="repo-img-light w-100" alt="{{ include.username }}" src="https://github-readme-streak-stats.herokuapp.com/?user={{ include.username }}&theme={{ site.repo_theme_light }}">
    <img class="repo-img-dark w-100" alt="{{ include.username }}" src="https://github-readme-streak-stats.herokuapp.com/?user={{ include.username }}&theme={{ site.repo_theme_dark }}">
  </a>
</div>
